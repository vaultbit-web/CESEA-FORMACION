<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CESEA Formación</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: 'Lato', sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #f8f9fa; overflow-x: hidden; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    ::selection { background: #f4780930; }
    input:focus, textarea:focus { border-color: #f47809 !important; }
    button { transition: transform 0.15s, opacity 0.15s; }
    button:active { transform: scale(0.97); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.0.3/dist/framer-motion.js"></script>
  <script>window.Motion = window["framer-motion"] || window.Motion;</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/mockData.jsx"></script>
  <script type="text/babel" src="src/auth.jsx"></script>
  <script type="text/babel" src="src/compliance.jsx"></script>
  <script type="text/babel" src="src/swipe.jsx"></script>
  <script type="text/babel" src="src/calendar.jsx"></script>
  <script type="text/babel" src="src/finance.jsx"></script>
  <script type="text/babel" src="src/layout.jsx"></script>

  <script type="text/babel">
    function App() {
      const { user } = React.useContext(AppContext);
      return user ? React.createElement(AppLayout) : React.createElement(AuthScreens);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(AppProvider, null, React.createElement(App))
    );
  </script>
</body>
</html>
